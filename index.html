<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шагай Аялал - Heritage Game</title>
    <style>
        :root {
            --mongol-blue: #003366;
            --gold: #FFD700;
            --white: #f4f4f4;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #game-container {
            width: 400px;
            background: white;
            border: 5px solid var(--mongol-blue);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: var(--mongol-blue);
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .shagai-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .shagai-slot {
            height: 80px;
            background: #eee;
            border: 2px dashed #ccc;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            transition: all 0.3s;
        }
        .rolled {
            border-style: solid;
            border-color: var(--gold);
            background: #fff;
            transform: scale(1.05);
        }
        button {
            background: var(--mongol-blue);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #0055aa; }
        button:disabled { background: #ccc; }
        
        #result-text {
            height: 30px;
            font-weight: bold;
            color: #d32f2f;
            margin-top: 10px;
        }
        .altanShar-result { color: #ff9800 !important; font-size: 20px; text-shadow: 1px 1px #000; }
        
        .build-section {
            margin-top: 20px;
            border-top: 1px solid #ddd;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <h2>🐎 Шагай Аялал</h2>
    
    <div class="stats-bar">
        <div>💰 Шагай: <span id="shagai-balance">0</span></div>
        <div>🎲 Эрх: <span id="rolls-display">5</span></div>
    </div>

    <div class="shagai-board">
        <div class="shagai-slot" id="s1">?</div>
        <div class="shagai-slot" id="s2">?</div>
        <div class="shagai-slot" id="s3">?</div>
        <div class="shagai-slot" id="s4">?</div>
    </div>

    <div id="result-text">Тоглоомоо эхэлнэ үү!</div>
    <br>
    <button onclick="rollShagai()" id="roll-btn">Шагай орхих</button>

    <div class="build-section">
        <h3>🏠 Гэр барих</h3>
        <button onclick="buildGer('hana')" style="font-size: 12px;">Хана (50)</button>
        <button onclick="buildGer('uni')" style="font-size: 12px;">Унь (80)</button>
        <button onclick="buildGer('toono')" style="font-size: 12px;">Тооно (150)</button>
    </div>
</div>

<script>
    // Тоглоомын төлөв
    let gameState = {
        shagaiCount: 0,
        rollsLeft: 5,
        gerStage: 0
    };

    const SHAGAI_TYPES = ["🐎 Морь", "🐑 Хонь", "🐄 Үхэр", "🐪 Тэмээ"];

    function rollShagai() {
        if (gameState.rollsLeft <= 0) {
            alert("Энэ үеийн эрх дууслаа!");
            return;
        }

        const slots = document.querySelectorAll('.shagai-slot');
        let currentRoll = [];
        
        slots.forEach(slot => {
            const randomIndex = Math.floor(Math.random() * 4);
            const result = SHAGAI_TYPES[randomIndex];
            currentRoll.push(result);
            
            slot.classList.add('rolled');
            slot.innerText = result.split(' ')[0]; // Эможи
        });

        calculatePoints(currentRoll);
        gameState.rollsLeft--;
        updateHUD();
    }

    function calculatePoints(roll) {
        const horses = roll.filter(s => s.includes("Морь")).length;
        let reward = 5;
        let resultEl = document.getElementById('result-text');

        if (horses === 4) {
            reward = 100;
            resultEl.className = 'altanShar-result';
            resultEl.innerText = "✨ АЛТАН ШАР БУУЛАА! +100 ✨";
        } else if (horses === 1) {
            reward = 10;
            resultEl.className = '';
            resultEl.innerText = "Морь буулаа! +10";
        } else {
            resultEl.className = '';
            resultEl.innerText = "Амжилттай! +5";
        }

        gameState.shagaiCount += reward;
    }

    function buildGer(part) {
        const costs = { 'hana': 50, 'uni': 80, 'toono': 150 };
        
        if (gameState.shagaiCount >= costs[part]) {
            gameState.shagaiCount -= costs[part];
            alert(part.toUpperCase() + " амжилттай баригдлаа!");
            updateHUD();
        } else {
            alert("Шагай хүрэлцэхгүй байна!");
        }
    }

    function updateHUD() {
        document.getElementById('shagai-balance').innerText = gameState.shagaiCount;
        document.getElementById('rolls-display').innerText = gameState.rollsLeft;
        
        if(gameState.rollsLeft === 0) {
            document.getElementById('roll-btn').disabled = true;
        }
    }
</script>

</body>
</html>
