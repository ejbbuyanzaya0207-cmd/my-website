<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шагай Аялал - Heritage Game</title>
    <style>
        :root {
            --mongol-blue: #003366;
            --gold: #FFD700;
            --white: #f4f4f4;
        }
        body {
            font-family: 'Arial', sans-serif;
            background-color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .stats-bar {
            display: flex;
            gap: 20px;
            background: var(--mongol-blue);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        canvas {
            background: #ffffff;
            border: 5px solid var(--mongol-blue);
            border-radius: 15px;
            cursor: crosshair;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .ui-panel {
            margin-top: 20px;
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 15px;
            width: 800px;
        }
        .build-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 15px;
        }
        button {
            background: var(--mongol-blue);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: #0055aa; transform: translateY(-2px); }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .log { color: #666; font-style: italic; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="stats-bar">
        <div>💰 Шагай: <span id="balance">0</span></div>
        <div>🎯 Онолт: <span id="hits">0</span></div>
        <div>🏠 Гэр: <span id="ger-status">Угсраагүй</span></div>
    </div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div class="ui-panel">
        <div id="game-log" class="log">Заавар: Шагайгаа хойш татаж байгаад тавьж харвана уу!</div>
        
        <div class="build-options">
            <button onclick="build('hana', 50)" id="btn-hana">Хана барих (50)</button>
            <button onclick="build('uni', 80)" id="btn-uni">Унь өлгөх (80)</button>
            <button onclick="build('toono', 150)" id="btn-toono">Тооно залах (150)</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Тоглоомын өгөгдөл
    const SHAGAI_SIDES = [
        { icon: "🐎", name: "Морь", points: 50 },
        { icon: "🐑", name: "Хонь", points: 10 },
        { icon: "🐪", name: "Тэмээ", points: 30 },
        { icon: "🐐", name: "Ямаа", points: 10 }
    ];

    let state = {
        shagaiBalance: 0,
        totalHits: 0,
        ger: { hana: false, uni: false, toono: false }
    };

    let isDragging = false;
    let startX, startY, mouseX, mouseY;

    // Харвах шагай
    let shooter = {
        x: 100, y: 200,
        vx: 0, vy: 0,
        radius: 20,
        moving: false,
        side: SHAGAI_SIDES[0]
    };

    // Байнууд (Санамсаргүй байрлалтай 3 шагай)
    let targets = [];
    function initTargets() {
        targets = [];
        for(let i=0; i<3; i++) {
            targets.push({
                x: 500 + Math.random() * 250,
                y: 50 + Math.random() * 300,
                radius: 18,
                active: true,
                side: SHAGAI_SIDES[Math.floor(Math.random() * 4)]
            });
        }
    }
    initTargets();

    // Input Events
    canvas.addEventListener('mousedown', e => {
        if (shooter.moving) return;
        const rect = canvas.getBoundingClientRect();
        let mX = e.clientX - rect.left;
        let mY = e.clientY - rect.top;

        if (Math.hypot(mX - shooter.x, mY - shooter.y) < shooter.radius * 1.5) {
            isDragging = true;
            startX = mX; startY = mY;
        }
    });

    canvas.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        mouseX = e.clientX - rect.left;
        mouseY = e.clientY - rect.top;
    });

    window.addEventListener('mouseup', () => {
        if (!isDragging) return;
        isDragging = false;
        shooter.vx = (startX - mouseX) * 0.15;
        shooter.vy = (startY - mouseY) * 0.15;
        shooter.moving = true;
    });

    function build(part, cost) {
        if (state.shagaiBalance >= cost) {
            state.shagaiBalance -= cost;
            state.ger[part] = true;
            document.getElementById(`btn-${part}`).disabled = true;
            updateUI();
            if(state.ger.hana && state.ger.uni && state.ger.toono) {
                document.getElementById('game-log').innerText = "✨ БАЯР ХҮРГЭЕ! Гэр бүрэн баригдлаа! ✨";
            }
        } else {
            alert("Шагай хүрэлцэхгүй байна!");
        }
    }

    function updateUI() {
        document.getElementById('balance').innerText = state.shagaiBalance;
        document.getElementById('hits').innerText = state.totalHits;
        const p = state.ger;
        document.getElementById('ger-status').innerText = (p.hana && p.uni && p.toono) ? "Бүрэн баригдсан" : "Дутуу...";
    }

    function drawEntity(x, y, radius, side, isShooter) {
        // Шагайн биет (зууван)
        ctx.beginPath();
        ctx.ellipse(x, y, radius, radius * 0.7, 0, 0, Math.PI * 2);
        ctx.fillStyle = isShooter ? "#D2B48C" : "#f4f4f4";
        ctx.fill();
        ctx.strokeStyle = "#8B4513";
        ctx.lineWidth = 2;
        ctx.stroke();

        // Дүрс (Emoji)
        ctx.font = `${radius}px Arial`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(side.icon, x, y);
    }

    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Зурхай зурах
        ctx.strokeStyle = "#eee";
        ctx.lineWidth = 1;
        ctx.strokeRect(50, 50, 700, 300);

        // Хүч заагч шугам
        if (isDragging) {
            ctx.beginPath();
            ctx.setLineDash([5, 5]);
            ctx.moveTo(shooter.x, shooter.y);
            ctx.lineTo(mouseX, mouseY);
            ctx.strokeStyle = "red";
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // Хөдөлгөөн
        if (shooter.moving) {
            shooter.x += shooter.vx;
            shooter.y += shooter.vy;
            shooter.vx *= 0.98; // Үрэлт
            shooter.vy *= 0.98;

            // Хана мөргөх
            if (shooter.x < 0 || shooter.x > canvas.width) shooter.vx *= -0.8;
            if (shooter.y < 0 || shooter.y > canvas.height) shooter.vy *= -0.8;

            // Зогсох
            if (Math.abs(shooter.vx) < 0.1 && Math.abs(shooter.vy) < 0.1) {
                shooter.moving = false;
                shooter.x = 100; shooter.y = 200;
                shooter.side = SHAGAI_SIDES[Math.floor(Math.random() * 4)];
            }
        }

        // Мөргөлдөөн шалгах
        targets.forEach(t => {
            if (t.active) {
                let dist = Math.hypot(shooter.x - t.x, shooter.y - t.y);
                if (dist < shooter.radius + t.radius) {
                    t.active = false;
                    state.shagaiBalance += t.side.points;
                    state.totalHits++;
                    document.getElementById('game-log').innerText = `Онолоо! ${t.side.name} бууж +${t.side.points} оноо авлаа.`;
                    updateUI();
                    // 1 секундын дараа шинэ бай гарч ирэх
                    setTimeout(() => {
                        t.active = true;
                        t.x = 500 + Math.random() * 250;
                        t.y = 50 + Math.random() * 300;
                        t.side = SHAGAI_SIDES[Math.floor(Math.random() * 4)];
                    }, 1000);
                }
                drawEntity(t.x, t.y, t.radius, t.side, false);
            }
        });

        // Shooter зурах
        drawEntity(shooter.x, shooter.y, shooter.radius, shooter.side, true);

        requestAnimationFrame(gameLoop);
    }

    gameLoop();
</script>
</body>
</html>
