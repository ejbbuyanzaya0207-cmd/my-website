<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шагай Аялал - GitHub Edition</title>
    <style>
        :root {
            --mongol-blue: #003366;
            --gold: #FFD700;
            --shagai-brown: #8B4513;
        }
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .stats {
            display: flex;
            gap: 20px;
            background: var(--mongol-blue);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        canvas {
            background: #fff;
            border: 4px solid var(--mongol-blue);
            border-radius: 10px;
            cursor: crosshair;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .ui-container {
            margin-top: 20px;
            text-align: center;
            max-width: 800px;
        }
        .build-menu {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        button {
            padding: 10px;
            border: none;
            border-radius: 5px;
            background: var(--mongol-blue);
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #0055aa; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .instructions { font-size: 0.9em; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="stats">
        <div>💰 Шагай: <span id="balance">0</span></div>
        <div>🎯 Оносон: <span id="hits">0</span></div>
        <div>🏠 Гэр: <span id="ger-status">Угсраагүй</span></div>
    </div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div class="ui-container">
        <div class="instructions">
            💡 <b>Заавар:</b> Шагай дээр хулганаар дарж, хойш татаж байгаад тавьж харвана. Байнуудыг онож оноо цуглуулаарай!
        </div>

        <div class="build-menu">
            <button onclick="buildGer('hana', 50)" id="btn-hana">Хана (50)</button>
            <button onclick="buildGer('uni', 80)" id="btn-uni">Унь (80)</button>
            <button onclick="buildGer('toono', 150)" id="btn-toono">Тооно (150)</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let gameState = {
        score: 0,
        hits: 0,
        gerParts: { hana: false, uni: false, toono: false }
    };

    let isDragging = false;
    let startX, startY, mouseX, mouseY;

    // Харвах шагай
    let shagai = {
        x: 150, y: 200,
        radius: 15,
        vx: 0, vy: 0,
        isMoving: false,
        friction: 0.98
    };

    // Байнууд
    let targets = [
        { x: 600, y: 150, radius: 15, active: true },
        { x: 650, y: 200, radius: 15, active: true },
        { x: 600, y: 250, radius: 15, active: true }
    ];

    canvas.addEventListener('mousedown', (e) => {
        if (shagai.isMoving) return;
        const rect = canvas.getBoundingClientRect();
        startX = e.clientX - rect.left;
        startY = e.clientY - rect.top;

        let dist = Math.hypot(startX - shagai.x, startY - shagai.y);
        if (dist < shagai.radius * 2) isDragging = true;
    });

    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        mouseX = e.clientX - rect.left;
        mouseY = e.clientY - rect.top;
    });

    window.addEventListener('mouseup', () => {
        if (!isDragging) return;
        isDragging = false;
        shagai.vx = (startX - mouseX) * 0.12;
        shagai.vy = (startY - mouseY) * 0.12;
        shagai.isMoving = true;
    });

    function buildGer(part, cost) {
        if (gameState.score >= cost) {
            gameState.score -= cost;
            gameState.gerParts[part] = true;
            document.getElementById(`btn-${part}`).disabled = true;
            updateUI();
            checkWin();
        } else {
            alert("Шагай хүрэлцэхгүй байна!");
        }
    }

    function updateUI() {
        document.getElementById('balance').innerText = gameState.score;
        document.getElementById('hits').innerText = gameState.hits;
        let p = gameState.gerParts;
        let status = (p.hana && p.uni && p.toono) ? "Бүрэн баригдсан ✨" : "Баригдаж байгаа...";
        document.getElementById('ger-status').innerText = status;
    }

    function checkWin() {
        if (gameState.gerParts.hana && gameState.gerParts.uni && gameState.gerParts.toono) {
            alert("Баяр хүргэе! Та гэрээ бүрэн барьж дууслаа.");
        }
    }

    function resetShagai() {
        shagai.x = 150; shagai.y = 200;
        shagai.vx = 0; shagai.vy = 0;
        shagai.isMoving = false;
    }

    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Зурхай/Талбай зурах
        ctx.strokeStyle = "#eee";
        ctx.strokeRect(50, 50, 700, 300);

        // Чиглүүлэгч шугам
        if (isDragging) {
            ctx.beginPath();
            ctx.setLineDash([5, 5]);
            ctx.moveTo(shagai.x, shagai.y);
            ctx.lineTo(mouseX, mouseY);
            ctx.strokeStyle = "rgba(0,0,0,0.3)";
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // Шагайн хөдөлгөөн
        if (shagai.isMoving) {
            shagai.x += shagai.vx;
            shagai.y += shagai.vy;
            shagai.vx *= shagai.friction;
            shagai.vy *= shagai.friction;

            // Хана мөргөх
            if (shagai.x < 0 || shagai.x > canvas.width) shagai.vx *= -1;
            if (shagai.y < 0 || shagai.y > canvas.height) shagai.vy *= -1;

            if (Math.abs(shagai.vx) < 0.2 && Math.abs(shagai.vy) < 0.2) resetShagai();
        }

        // Байнууд зурах ба мөргөлдөөн шалгах
        targets.forEach(t => {
            if (t.active) {
                let dist = Math.hypot(shagai.x - t.x, shagai.y - t.y);
                if (dist < shagai.radius + t.radius) {
                    t.active = false;
                    gameState.score += 20;
                    gameState.hits += 1;
                    updateUI();
                    setTimeout(() => { t.active = true; t.x = 500 + Math.random() * 200; t.y = 100 + Math.random() * 200; }, 1000);
                }
                ctx.fillStyle = "#d32f2f";
                ctx.beginPath();
                ctx.arc(t.x, t.y, t.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        });

        // Гол шагай зурах
        ctx.fillStyle = var(--shagai-brown);
        ctx.beginPath();
        ctx.arc(shagai.x, shagai.y, shagai.radius, 0, Math.PI * 2);
        ctx.shadowBlur = 10;
        ctx.shadowColor = "rgba(0,0,0,0.2)";
        ctx.fill();
        ctx.shadowBlur = 0;

        requestAnimationFrame(gameLoop);
    }

    gameLoop();
</script>
</body>
</html>
