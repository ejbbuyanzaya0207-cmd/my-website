<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <title>Шагай Аялал - 3D Gold Edition</title>
    <style>
        :root { --mongol-blue: #003366; --gold: #D4AF37; }
        body { font-family: 'Arial', sans-serif; background: #e0e0e0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .stats { display: flex; gap: 20px; background: var(--mongol-blue); color: white; padding: 15px 30px; border-radius: 50px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        canvas { background: #fff; border: 5px solid var(--mongol-blue); border-radius: 15px; cursor: crosshair; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .info { margin-top: 15px; padding: 15px; background: white; border-radius: 10px; text-align: center; width: 800px; }
        .highlight { color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>

    <div class="stats">
        <div>💰 Цуглуулсан: <span id="score">0</span></div>
        <div>🎯 Одоо харвах: <span id="target-hint" class="highlight">Морь 🐎</span></div>
    </div>

    <canvas id="gameCanvas" width="900" height="450"></canvas>

    <div class="info">
        💡 <b>Дүрэм:</b> Талбай дээр 15 шагай тогтмол байна. Зөвхөн өөрийн шагайтай <span class="highlight">ижил дүрсийг</span> онож цуглуулаарай!
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const SHAGAI_SIDES = [
        { name: "Морь", icon: "🐎" },
        { name: "Хонь", icon: "🐑" },
        { name: "Тэмээ", icon: "🐪" },
        { name: "Ямаа", icon: "🐐" }
    ];

    let score = 0;
    let isDragging = false;
    let startX, startY, mouseX, mouseY;

    // Харвагч шагай
    let shooter = { 
        x: 100, y: 225, vx: 0, vy: 0, radius: 25, moving: false, 
        side: SHAGAI_SIDES[0] 
    };

    // 15 Бай шагайг үүсгэх
    let targets = [];
    function refillTargets() {
        while (targets.length < 15) {
            targets.push({
                x: 350 + Math.random() * 500,
                y: 50 + Math.random() * 350,
                radius: 20,
                active: true,
                side: SHAGAI_SIDES[Math.floor(Math.random() * 4)]
            });
        }
    }

    // 3D АЛТЛАГ ШАГАЙ ЗУРАХ ФУНКЦ
    function draw3DShagai(ctx, x, y, radius, side, isShooter) {
        ctx.save();
        ctx.translate(x, y);

        // Сүүдэр
        ctx.shadowColor = "rgba(0,0,0,0.3)";
        ctx.shadowBlur = 10;
        ctx.shadowOffsetY = 5;

        // Алтлаг Gradient
        let grad = ctx.createLinearGradient(-radius, -radius, radius, radius);
        grad.addColorStop(0, "#8B6508");   
        grad.addColorStop(0.3, "#D4AF37"); 
        grad.addColorStop(0.5, "#FFFFFF"); // Гялбаа
        grad.addColorStop(0.7, "#FFD700"); 
        grad.addColorStop(1, "#B8860B");   

        ctx.fillStyle = grad;
        ctx.strokeStyle = "rgba(139, 101, 8, 0.4)";
        ctx.lineWidth = 1;

        // Хэлбэр зурах (Bezier Curves)
        ctx.beginPath();
        if (side.name === "Морь") {
            ctx.ellipse(0, 0, radius, radius * 0.7, 0, 0, Math.PI * 2);
        } else if (side.name === "Тэмээ") {
            ctx.moveTo(-radius, -radius * 0.2);
            ctx.quadraticCurveTo(0, -radius * 1.5, radius, -radius * 0.2);
            ctx.quadraticCurveTo(0, radius * 1.5, -radius, -radius * 0.2);
        } else if (side.name === "Хонь") {
            ctx.ellipse(0, 0, radius * 0.9, radius * 0.9, 0, 0, Math.PI * 2);
        } else { // Ямаа
            ctx.moveTo(-radius, 0);
            ctx.lineTo(0, -radius);
            ctx.lineTo(radius, 0);
            ctx.lineTo(0, radius);
            ctx.closePath();
        }
        ctx.fill();
        ctx.stroke();

        // Дүрс (Emoji)
        ctx.shadowBlur = 0;
        ctx.shadowOffsetY = 0;
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.font = `bold ${radius}px Arial`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(side.icon, 0, 0);

        ctx.restore();
    }

    // Хулганы үйлдлүүд
    canvas.addEventListener('mousedown', e => {
        if (shooter.moving) return;
        const rect = canvas.getBoundingClientRect();
        let mX = e.clientX - rect.left;
        let mY = e.clientY - rect.top;
        if (Math.hypot(mX - shooter.x, mY - shooter.y) < shooter.radius * 2) {
            isDragging = true; startX = mX; startY = mY;
        }
    });

    canvas.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        mouseX = e.clientX - rect.left;
        mouseY = e.clientY - rect.top;
    });

    window.addEventListener('mouseup', () => {
        if (!isDragging) return;
        isDragging = false;
        shooter.vx = (startX - mouseX) * 0.15;
        shooter.vy = (startY - mouseY) * 0.15;
        shooter.moving = true;
    });

    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Харвах чиглэл заах шугам
        if (isDragging) {
            ctx.beginPath();
            ctx.moveTo(shooter.x, shooter.y);
            ctx.lineTo(mouseX, mouseY);
            ctx.strokeStyle = "rgba(0,0,0,0.1)";
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // Харвагчийг хөдөлгөх
        if (shooter.moving) {
            shooter.x += shooter.vx; shooter.y += shooter.vy;
            shooter.vx *= 0.985; shooter.vy *= 0.985; // Үрэлт

            if (shooter.x < 25 || shooter.x > canvas.width - 25) shooter.vx *= -0.8;
            if (shooter.y < 25 || shooter.y > canvas.height - 25) shooter.vy *= -0.8;

            if (Math.abs(shooter.vx) < 0.2 && Math.abs(shooter.vy) < 0.2) {
                shooter.moving = false; shooter.x = 100; shooter.y = 225;
                shooter.side = SHAGAI_SIDES[Math.floor(Math.random() * 4)];
                document.getElementById('target-hint').innerText = shooter.side.name + " " + shooter.side.icon;
            }
        }

        // Бай шагайнуудыг шалгах
        targets.forEach((t, i) => {
            if (t.active) {
                let dist = Math.hypot(shooter.x - t.x, shooter.y - t.y);
                if (dist < shooter.radius + t.radius) {
                    if (t.side.name === shooter.side.name) {
                        t.active = false;
                        score += 1;
                        document.getElementById('score').innerText = score;
                        targets.splice(i, 1);
                        refillTargets(); // Устсан бол нөхөж 15 болгох
                    } else {
                        // Өөр дүрс бол ойж холдох
                        t.x += shooter.vx * 0.4;
                        t.y += shooter.vy * 0.4;
                    }
                }
                draw3DShagai(ctx, t.x, t.y, t.radius, t.side, false);
            }
        });

        draw3DShagai(ctx, shooter.x, shooter.y, shooter.radius, shooter.side, true);
        requestAnimationFrame(gameLoop);
    }

    refillTargets();
    gameLoop();
</script>
</body>
</html>
